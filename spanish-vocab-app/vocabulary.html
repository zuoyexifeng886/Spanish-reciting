<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>词库管理 - 西语背单词</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app-container">
        <!-- 顶部导航 -->
        <header class="page-header">
            <button class="back-btn" onclick="history.back()">←</button>
            <h1>词库管理</h1>
            <button class="add-btn" onclick="showAddWordModal()">+</button>
        </header>

        <!-- 分类筛选 -->
        <div class="filter-bar">
            <div class="category-tabs">
                <button class="tab-btn active" data-category="all">全部</button>
                <button class="tab-btn" data-category="daily">日常基础</button>
                <button class="tab-btn" data-category="travel">旅游</button>
                <button class="tab-btn" data-category="business">商务</button>
                <button class="tab-btn" data-category="dele">DELE真题</button>
            </div>
            <div class="level-filter">
                <select id="levelFilter" onchange="filterWords()">
                    <option value="all">全部等级</option>
                    <option value="A1">A1</option>
                    <option value="A2">A2</option>
                    <option value="B1">B1</option>
                    <option value="B2">B2</option>
                    <option value="C1">C1</option>
                </select>
            </div>
        </div>

        <!-- 搜索栏 -->
        <div class="search-bar">
            <input type="text" id="searchInput" placeholder="搜索单词或释义..." oninput="filterWords()">
        </div>

        <!-- 导入导出工具栏 -->
        <div class="toolbar">
            <button class="import-btn" onclick="importVocabulary()">📥 导入Excel词库</button>
            <button class="export-btn" onclick="exportVocabulary()">📤 导出备份</button>
            <button class="sample-btn" onclick="loadSampleVocabulary()">✨ 加载示例词库</button>
        </div>

        <!-- 单词列表 -->
        <div class="word-list" id="wordList">
            <!-- 单词卡片将通过JS动态生成 -->
        </div>

        <!-- 空状态提示 -->
        <div class="empty-state" id="emptyState" style="display:none">
            <div class="empty-icon">📭</div>
            <p>暂无单词</p>
            <p class="empty-desc">点击右上角 + 添加，或导入Excel词库</p>
        </div>
    </div>

    <!-- 添加/编辑单词弹窗 -->
    <div class="modal" id="wordModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">添加单词</h3>
                <button class="close-btn" onclick="closeWordModal()">×</button>
            </div>
            <div class="modal-body">
                <form id="wordForm">
                    <input type="hidden" id="wordId">
                    <div class="form-group">
                        <label>西班牙语单词 *</label>
                        <input type="text" id="spanishInput" required placeholder="例如：hola">
                    </div>
                    <div class="form-group">
                        <label>词性</label>
                        <input type="text" id="typeInput" placeholder="例如：名词、动词、形容词">
                    </div>
                    <div class="form-group">
                        <label>中文释义 *</label>
                        <input type="text" id="chineseInput" required placeholder="例如：你好">
                    </div>
                    <div class="form-group">
                        <label>动词变位</label>
                        <textarea id="conjugationInput" rows="3" placeholder="如是动词，可填写变位形式"></textarea>
                    </div>
                    <div class="form-group">
                        <label>场景例句</label>
                        <textarea id="exampleInput" rows="2" placeholder="例如：¡Hola! ¿Cómo estás?"></textarea>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>难度等级</label>
                            <select id="levelInput">
                                <option value="A1">A1</option>
                                <option value="A2">A2</option>
                                <option value="B1">B1</option>
                                <option value="B2">B2</option>
                                <option value="C1">C1</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>分类</label>
                            <select id="categoryInput">
                                <option value="daily">日常基础</option>
                                <option value="travel">旅游</option>
                                <option value="business">商务</option>
                                <option value="dele">DELE真题</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group checkbox-group">
                        <label>
                            <input type="checkbox" id="highFreqInput"> 标记为高频词
                        </label>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn-secondary" onclick="closeWordModal()">取消</button>
                <button class="btn-primary" onclick="saveWord()">保存</button>
            </div>
        </div>
    </div>

    <!-- 底部导航 -->
    <nav class="bottom-nav">
        <a href="index.html" class="nav-item">
            <span class="nav-icon">🏠</span>
            <span class="nav-label">首页</span>
        </a>
        <a href="study.html" class="nav-item">
            <span class="nav-icon">📖</span>
            <span class="nav-label">学习</span>
        </a>
        <a href="practice.html" class="nav-item">
            <span class="nav-icon">✏️</span>
            <span class="nav-label">练习</span>
        </a>
        <a href="vocabulary.html" class="nav-item active">
            <span class="nav-icon">📚</span>
            <span class="nav-label">词库</span>
        </a>
        <a href="settings.html" class="nav-item">
            <span class="nav-icon">⚙️</span>
            <span class="nav-label">我的</span>
        </a>
    </nav>

    <script src="js/storage.js"></script>
    <script src="js/vocabulary.js"></script>
</body>
</html>
