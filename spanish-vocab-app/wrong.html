<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>错题本 - 西语背单词</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app-container">
        <!-- 顶部导航 -->
        <header class="page-header">
            <button class="back-btn" onclick="history.back()">←</button>
            <h1>错题本</h1>
            <button class="action-btn" onclick="startWrongPractice()">开始练习</button>
        </header>

        <!-- 错题统计 -->
        <div class="wrong-stats">
            <div class="wrong-stat-card">
                <span class="stat-num" id="wrongTotal">0</span>
                <span class="stat-label">错题总数</span>
            </div>
            <div class="wrong-stat-card">
                <span class="stat-num" id="wrongToday">0</span>
                <span class="stat-label">今日新增</span>
            </div>
        </div>

        <!-- 筛选栏 -->
        <div class="filter-bar">
            <div class="category-tabs">
                <button class="tab-btn active" data-filter="all">全部错题</button>
                <button class="tab-btn" data-filter="today">今日错题</button>
                <button class="tab-btn" data-filter="frequent">高频错题</button>
            </div>
        </div>

        <!-- 错题列表 -->
        <div class="wrong-list" id="wrongList">
            <!-- 错题卡片通过JS动态生成 -->
        </div>

        <!-- 空状态 -->
        <div class="empty-state" id="emptyWrong" style="display:none">
            <div class="empty-icon">🎯</div>
            <p>暂无错题</p>
            <p class="empty-desc">太棒了！继续保持，错题会自动收录到这里</p>
        </div>

        <!-- 底部操作栏 -->
        <div class="bottom-actions" id="bottomActions" style="display:none">
            <button class="btn-secondary" onclick="clearAllWrong()">清空错题本</button>
            <button class="btn-primary" onclick="startWrongPractice()">错题专项练习</button>
        </div>
    </div>

    <!-- 底部导航 -->
    <nav class="bottom-nav">
        <a href="index.html" class="nav-item">
            <span class="nav-icon">🏠</span>
            <span class="nav-label">首页</span>
        </a>
        <a href="study.html" class="nav-item">
            <span class="nav-icon">📖</span>
            <span class="nav-label">学习</span>
        </a>
        <a href="practice.html" class="nav-item">
            <span class="nav-icon">✏️</span>
            <span class="nav-label">练习</span>
        </a>
        <a href="vocabulary.html" class="nav-item">
            <span class="nav-icon">📚</span>
            <span class="nav-label">词库</span>
        </a>
        <a href="settings.html" class="nav-item">
            <span class="nav-icon">⚙️</span>
            <span class="nav-label">我的</span>
        </a>
    </nav>

    <script src="js/storage.js"></script>
    <script src="js/wrong.js"></script>
</body>
</html>
