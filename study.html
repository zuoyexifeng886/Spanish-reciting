<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>单词学习 - 西语背单词</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app-container">
        <!-- 顶部导航 -->
        <header class="page-header">
            <button class="back-btn" onclick="history.back()">←</button>
            <h1 id="pageTitle">学习新词</h1>
            <div class="progress-info">
                <span id="currentIndex">0</span>/<span id="totalCount">0</span>
            </div>
        </header>

        <!-- 进度条 -->
        <div class="progress-bar-container">
            <div class="progress-bar" id="progressBar"></div>
        </div>

        <!-- 单词卡片区域 -->
        <div class="study-area">
            <div class="word-card" id="wordCard" onclick="flipCard()">
                <div class="card-front">
                    <div class="word-level" id="wordLevel">A1</div>
                    <h2 class="word-spanish" id="wordSpanish">hola</h2>
                    <button class="pronounce-btn" onclick="event.stopPropagation(); pronounceWord()" id="pronounceBtn">
                        🔊 播放发音
                    </button>
                    <p class="card-hint">点击卡片查看释义</p>
                </div>
                <div class="card-back">
                    <div class="word-type" id="wordType">感叹词</div>
                    <h3 class="word-chinese" id="wordChinese">你好</h3>
                    <div class="word-conjugation" id="wordConjugation" style="display:none"></div>
                    <div class="word-example" id="wordExample" style="display:none"></div>
                </div>
            </div>
        </div>

        <!-- 记忆评级按钮 -->
        <div class="rating-area" id="ratingArea" style="display:none">
            <p class="rating-title">你记住这个单词了吗？</p>
            <div class="rating-buttons">
                <button class="rating-btn bad" onclick="rateWord('bad')">
                    <span class="rating-emoji">😫</span>
                    <span class="rating-label">没记住</span>
                    <span class="rating-next">1天后复习</span>
                </button>
                <button class="rating-btn medium" onclick="rateWord('medium')">
                    <span class="rating-emoji">🤔</span>
                    <span class="rating-label">有点印象</span>
                    <span class="rating-next">3天后复习</span>
                </button>
                <button class="rating-btn good" onclick="rateWord('good')">
                    <span class="rating-emoji">😊</span>
                    <span class="rating-label">记住了</span>
                    <span class="rating-next">7天后复习</span>
                </button>
                <button class="rating-btn perfect" onclick="rateWord('perfect')">
                    <span class="rating-emoji">🎉</span>
                    <span class="rating-label">非常熟</span>
                    <span class="rating-next">15天后复习</span>
                </button>
            </div>
        </div>

        <!-- 完成状态 -->
        <div class="complete-state" id="completeState" style="display:none">
            <div class="complete-icon">🎊</div>
            <h2>太棒了！</h2>
            <p id="completeMessage">今日单词已全部学习完成</p>
            <div class="complete-stats">
                <div class="complete-stat">
                    <span class="stat-num" id="learnedCount">0</span>
                    <span class="stat-label">已学单词</span>
                </div>
                <div class="complete-stat">
                    <span class="stat-num" id="accuracyRate">0%</span>
                    <span class="stat-label">掌握率</span>
                </div>
            </div>
            <div class="complete-actions">
                <button class="btn-primary" onclick="goHome()">返回首页</button>
                <button class="btn-secondary" onclick="startPractice()">去做练习</button>
            </div>
        </div>
    </div>

    <!-- 底部导航 -->
    <nav class="bottom-nav">
        <a href="index.html" class="nav-item">
            <span class="nav-icon">🏠</span>
            <span class="nav-label">首页</span>
        </a>
        <a href="study.html" class="nav-item active">
            <span class="nav-icon">📖</span>
            <span class="nav-label">学习</span>
        </a>
        <a href="practice.html" class="nav-item">
            <span class="nav-icon">✏️</span>
            <span class="nav-label">练习</span>
        </a>
        <a href="vocabulary.html" class="nav-item">
            <span class="nav-icon">📚</span>
            <span class="nav-label">词库</span>
        </a>
        <a href="settings.html" class="nav-item">
            <span class="nav-icon">⚙️</span>
            <span class="nav-label">我的</span>
        </a>
    </nav>

    <script src="js/storage.js"></script>
    <script src="js/study.js"></script>
</body>
</html>
